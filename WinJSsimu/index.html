<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/winjs/4.4.0/css/ui-dark.css" />
    
    <!-- js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/winjs/4.4.0/js/base.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/winjs/4.4.0/js/ui.js"></script>
    <script>
    (function () {
        "use strict";
        WinJS.Application.onready = function () {
            WinJS.UI.processAll().then(function() {
                console.log("WinJS init.")
                
                var rating = document.getElementById("ratingControlHost").winControl;
                rating.averageRating = 3;
            });
        };

        WinJS.Application.start();
    })();
</script>
</head>
<body>
    <div id="ratingControlHost" data-win-control="WinJS.UI.Rating"></div>
    <div id="datePickerHost" data-win-control="WinJS.UI.DatePicker"></div>
</body>
</html>
